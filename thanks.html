<style>

    background:linear-gradient(180deg,#fffdf8 0%,#fff3f0 100%);
    color:#3a2e28;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;max-width:480px;
    background:#fffdf8;
    border:1.5px solid #e1c489;
    border-radius:20px;
    padding:40px 28px;
    text-align:center;
    box-shadow:0 12px 40px rgba(184,137,58,.12);
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;inset:8px;
    border:0.5px solid #dcbd84;
    border-radius:14px;
    pointer-events:none;
  }
  .seal{
    display:inline-block;
    font-size:10px;letter-spacing:.25em;font-weight:700;
    color:#a87a2f;
    border:1px solid #c79a3f;border-radius:99px;

  }
  .dogimg{

    border:3px solid #fff;
    box-shadow:0 6px 16px rgba(184,137,58,.2);
    margin:0 auto 18px;
    display:block;
  }
  h1{

  }

  .role{

  }
  .tagline{

    padding:12px 0;margin-bottom:24px;
    border-top:1px dashed #dcbd84;
    border-bottom:1px dashed #dcbd84;
  }
  .dlbtn{
    display:inline-block;width:100%;
    background:linear-gradient(135deg,#e58aa0,#d56a86);
    color:#fff;text-decoration:none;
    font-size:15px;font-weight:800;letter-spacing:.1em;
    padding:16px 0;border-radius:99px;
    box-shadow:0 6px 16px rgba(229,138,160,.35);
    transition:transform .15s ease, box-shadow .15s ease;
    font-family:inherit;
  }
  .dlbtn:active{transform:translateY(2px);box-shadow:0 3px 8px rgba(229,138,160,.3);}
  .note{
    font-size:11.5px;color:#9c8676;line-height:1.8;
    margin-top:16px;
  }
  .back{
    display:inline-block;margin-top:28px;
    font-size:12px;color:#b88a3a;
    text-decoration:none;letter-spacing:.1em;
    border-bottom:1px solid #e7cf9f;
    padding-bottom:2px;
  }
  .errbox{padding:20px 0;}
  .errbox h1{margin-bottom:14px;}

<body>
  <div class="card" id="card">

    infp: {breed:'マルチーズ',    role:'仲介者',        title:'理想の恋を守り抜く ロマンチスト'},
    enfj: {breed:'ゴールデン',    role:'主人公',        title:'尽くして愛される みんなの太陽'},
    enfp: {breed:'プードル',      role:'運動家',        title:'恋を全力で 楽しむ情熱家'},
    istj: {breed:'柴犬',          role:'管理者',        title:'一度決めたら 一生の恋愛職人'},
    isfj: {breed:'シーズー',      role:'擁護者',        title:'さりげなく尽くす 癒しの献身家'},
    estj: {breed:'ボストン',      role:'幹部',          title:'着実に愛を育てる 誠実な紳士'},
    esfj: {breed:'ラブラドール',  role:'領事',          title:'愛をたっぷり伝える 世話好き'},

  if (data) {
    document.getElementById('breed').textContent = data.breed + '（' + type.toUpperCase() + '）';

    var dlbtn = document.getElementById('dlbtn');
    dlbtn.setAttribute('href', R2_BASE + '/' + type + '_love_guide.pdf');

    if (DOG_IMG_BASE) {
      document.getElementById('dogimg').src = DOG_IMG_BASE + '/' + type + '_dog.png';
