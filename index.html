<style>

.dogrow{font-size:34px;margin:18px 0 6px;filter:saturate(1.05)}
.btn{

}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(229,138,160,.5)}

/* ---- quiz ---- */

.progress{display:flex;justify-content:center;gap:7px;margin:18px 0 8px;flex-wrap:wrap}
.pip{width:13px;height:13px;border-radius:50%;background:#f0ddd0;transition:.3s}

.qcount{font-size:13px;color:var(--ink-soft);letter-spacing:.1em}
.qcard{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 22px;margin-top:14px}
.qtext{font-size:20px;font-weight:700;text-align:center;line-height:1.6;min-height:3.2em;display:flex;align-items:center;justify-content:center}
.opts{margin-top:18px;display:grid;gap:12px}
.opt{
  border:2.5px solid #f1e2d6;background:#fff;border-radius:18px;padding:16px 18px;
  font-family:inherit;font-size:16px;font-weight:500;color:var(--ink);cursor:pointer;
  text-align:left;transition:.16s;line-height:1.5;
}
.opt:hover{border-color:var(--pink);background:#fff6f8;transform:translateY(-1px)}

/* ---- shortcut grid ---- */
.grid16{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:18px}
.tcell{
  border:none;cursor:pointer;font-family:inherit;border-radius:16px;padding:12px 4px 10px;
  background:#fff;box-shadow:0 4px 12px rgba(180,140,120,.14);transition:.15s;text-align:center;
}
.tcell:hover{transform:translateY(-3px) scale(1.03)}
.tcell .em{font-size:24px;display:block}
.tcell .code{font-family:'Baloo 2';font-weight:700;font-size:13px;margin-top:3px}

.cert .role{font-size:13px;text-align:center;color:var(--ink-soft)}
.cert .tagline{font-size:16px;text-align:center;font-weight:700;margin:14px auto 4px;max-width:24em;line-height:1.6}

.sec h3 .dot{width:10px;height:10px;border-radius:50%;background:var(--pink-deep)}
.sec p{font-size:15px}

/* ad + bonus slots */

/* ---- compatibility ---- */
.compat-pick{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px;margin-top:18px}

.pair{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 14px}

.pair .dog{width:88px;height:auto;border-radius:12px}
.pair .heart{font-size:22px}

/* ---- canvas / share ---- */

.sns{display:flex;gap:10px;margin-top:12px}
.sns .btn{margin:0;font-size:15px;padding:14px}

footer{text-align:center;font-size:11.5px;color:var(--ink-soft);padding:30px 0 10px;line-height:1.9}

/* ---- language switcher ---- */
.langbar{display:flex;justify-content:center;gap:6px;padding:16px 0 0;flex-wrap:wrap}

const LOC={"ja": {"INTJ": {"role": "建築家", "breed": "チワワ", "tag": "小さな体に強気なプライド。本命にだけ心を開く計算家。", "pros": ["一途", "頭がいい", "ブレない"], "cons": ["素直になれない", "警戒心が強い", "プライド高め"], "personality": "小さな体に、誰よりも大きな自信とプライドを秘めたしっかり者。頭の回転が速く、物事をいつも一歩先まで読んで動きます。むやみに群れず、自分だけの世界とルールをしっかり持っているので、まわりからは「クールでちょっとミステリアス」に見られがち。警戒心が強く心の壁は高めですが、その壁の内側に入れた相手の前では、ツンとした態度がうそのように甘えん坊に。そのギャップの大きさが、このコのいちばんの魅力です。", "love": "恋にも、どこか冷静な戦略家の一面が出ます。誰にでも尻尾を振ったりはせず、「この人は本命か、それとも違うのか」を心の中でしっかり見極めてから動くタイプ。だからこそ一度「この人」と決めたら、まわりが見えなくなるほど一途にのめり込みます。表向きはクールでも、内側ではヤキモチや独占欲がじわっと育っていて、好きな人が他の異性と仲良くしていると内心穏やかではいられません。素直に甘えられたら最強なのに、と自分でも思っているはず。", "howto": "軽いノリやチャラチャラしたアプローチは完全に逆効果。プライドを尊重しながら、知的で対等に話せる相手だと感じてもらうことが、固い心の扉を開く第一歩です。媚びる必要はなく、むしろ自分の意見をきちんと持っている人に惹かれます。そのうえで「あなたは特別だよ」という気持ちをさりげなく、でもまっすぐ伝えてあげてください。焦りは禁物。時間をかけて少しずつ信頼を積み重ねれば、ある日ふっと甘えてくる瞬間が訪れます。"}, "INTP": {"role": "論理学者", "breed": "ミニチュアシュナウザー", "tag": "理屈っぽい哲学者。分析しすぎるけど沼ると一途。", "pros": ["発想が面白い", "束縛しない", "深く考える"], "cons": ["鈍感", "腰が重い", "理屈っぽい"], "personality": "好奇心と探究心のかたまりで、頭の中はいつも考えごとでいっぱいの哲学者タイプ。マイペースで、興味のあることにはとことん没頭する一方、どうでもいいことには驚くほど無頓着です。独自の視点と理屈を持っていて、まわりからは「ちょっと変わってるけど面白い人」と思われがち。感情を表に出すのは得意ではなく、人付き合いも狭く深く。にぎやかな場より、気の合う相手と静かに語り合う時間にこそ、このコらしさが輝きます。", "love": "恋愛すらも、つい分析の対象にしてしまうタイプ。「これは恋なのか、ただの興味なのか」と考え込んでいるうちに、肝心のタイミングを逃してしまうことも少なくありません。アプローチは控えめで不器用ですが、一度「この人だ」と腑に落ちると、その愛情はとても深くまっすぐ。束縛は好まず、お互いの世界を尊重し合える距離感を大切にします。言葉数は多くないけれど相手をよく観察していて、ふとした瞬間に核心を突くやさしさを見せてくれます。", "howto": "感情でグイグイ押すより、知的な好奇心をくすぐる会話が何よりの近道。一緒に考えたり、新しい発見を共有できる相手だと、自然と心を開いてくれます。返事が遅かったりリアクションが薄かったりしても、興味がないわけではなく、頭の中でじっくり言葉を選んでいるだけ。急かさず、マイペースを尊重してあげてください。「一緒にいるとラクで楽しい」と思わせることができれば大成功。気づけば、このコのほうがあなたを手放せなくなっています。"}, "ENTJ": {"role": "指揮官", "breed": "コーギー", "tag": "仕切りたがりの女王様。グイグイ引っ張る頼れるリーダー。", "pros": ["頼れる", "決断力", "尽くす"], "cons": ["仕切りすぎ", "負けず嫌い", "弱音が苦手"], "personality": "目標に向かって一直線に進む、生まれながらのリーダータイプ。決断が早く行動力も抜群で、まわりを自然と引っ張っていく頼れる存在です。仕切るのが得意で、グループでは気づけば中心に。負けず嫌いで努力家、向上心も人一倍強く、停滞や言い訳が大の苦手です。短い脚で堂々と胸を張る姿そのままに、小さなことでうじうじしない潔さが魅力。ただし完璧主義なぶん、自分にも他人にも厳しくなりがちな一面もあります。", "love": "恋愛でも主導権を握りたいタイプで、デートも関係の進め方も自分でしっかりデザインしたい派。気になる相手にはストレートかつ計画的にアプローチし、あいまいな関係をだらだら続けるのは好みません。守りたい・支えたいという気持ちが強く、「この人」と決めたら全力で相手を引っ張り、惜しみなく尽くします。頼られると燃えるので頼もしさは抜群。ただプライドが高く弱音を見せるのが苦手なので、本当はもっと甘えたいのに、と一人で抱え込むことも。", "howto": "このコは頼られることに喜びを感じるので、思い切って甘えたり相談を持ちかけたりするのが効果的。「あなたがいてくれて心強い」と素直に伝えると、ますます張り切ってあなたを支えてくれます。そのうえで、たまにふっと見せる弱さや本音をやさしく受け止めてあげると、固いリーダーの仮面の下にある可愛らしさにぐっと距離が縮まります。対等に意見を言い合える関係も大歓迎。媚びるより、自分の軸を持った相手のほうが、このコの心を強く惹きつけます。"}, "ENTP": {"role": "討論者", "breed": "ジャックラッセル・テリア", "tag": "機転とイタズラで退屈させない、刺激好きの自由人。", "pros": ["会話が楽しい", "行動的", "ポジティブ"], "cons": ["飽きっぽい", "口が達者", "つかみどころなし"], "personality": "頭の回転が速くトークも巧みで、どこにいても場を盛り上げる人気者。新しいこと・面白いことに目がなく、じっとしているのが苦手で、いつも次の刺激を探しています。発想力が豊かなアイデアマンで、議論やちょっとした言葉遊びも大好き。フットワークが軽く、思い立ったらすぐ行動に移します。そのエネルギッシュさと自由さで、まわりをいつもワクワクさせてくれる存在。飽きっぽさはあるものの、好奇心の強さは誰にも負けません。", "love": "退屈こそが最大の敵。マンネリや決まりきった関係が苦手で、いつも新鮮な刺激とちょっとしたスリルを求めます。駆け引きを楽しむタイプで、追われるよりも追いかけたい派。気になる相手には機転の利いたトークでぐいぐい距離を詰めますが、簡単に手に入ると一気に熱が冷めてしまうことも。逆に、自分の知らない一面を見せてくれる相手や知的に渡り合える相手には、めずらしく本気でのめり込みます。自由を愛するぶん束縛は苦手ですが、信頼できる相手の前では意外と一途な顔も。", "howto": "このコを落とすカギは、ずばり「飽きさせないこと」。予測できない展開や、一緒に楽しめる新しい体験を用意してあげると、目を輝かせて夢中になります。知的な会話のキャッチボールも大好物なので、軽妙に切り返せる相手だとポイント高め。ただし、あえて全部を見せず、ミステリアスな部分を少し残しておくのがコツです。「この人、まだまだ知らない一面がありそう」と思わせれば、追いかけたがりのこのコは、自分から夢中になって距離を詰めてきます。"}, "INFJ": {"role": "提唱者", "breed": "キャバリア", "tag": "潤んだ瞳の理想主義者。たった一人に静かで深い愛。", "pros": ["思いやり", "一途", "察しがいい"], "cons": ["抱え込む", "理想が高い", "人見知り"], "personality": "やさしく思慮深く、人の気持ちの機微を驚くほど敏感に感じ取るタイプ。理想が高く、表には出さないけれど、心の奥には熱く揺るがない信念を秘めています。誰とでも広く付き合うより、少数の大切な人と深くつながることを好み、相手の痛みに静かに寄り添う包容力が魅力です。潤んだ瞳の奥でいろんなことを考えていて、ときに自分の感情まで抱え込んでしまうことも。物静かに見えて芯はとても強い、奥行きのあるコです。", "love": "恋愛には、運命や深いつながりを求めるロマンチストな一面があります。軽い気持ちで付き合うことはほとんどなく、相手の内面や価値観をじっくり見極めてから、ゆっくり心を開いていくタイプ。だからこそ、一度「この人」と信じた相手には、自分のすべてを捧げるように深く一途に愛します。察しがよく、相手が言葉にしない気持ちまで汲み取ってやさしくしてくれる反面、自分の本音や弱さはなかなか見せられず、一人で抱え込んでしまいがち。理解されたとき、心から安心して心をあずけられるコです。", "howto": "焦りは禁物。表面的な盛り上がりより、ゆっくり時間をかけて「この人になら本音を話せる」と思ってもらうことが何よりも大切です。話をさえぎらず丁寧に耳を傾け、価値観や考え方に共感を示すと、固く閉じた心の扉が少しずつ開いていきます。見た目や条件より、内面のつながりを感じた瞬間に強く惹かれるタイプ。そして、いつも気を配ってくれるこのコ自身にも目を向け「あなたはどうしたい？」とやさしく尋ねてあげると、深く満たされ、あなたを唯一の存在として大切にしてくれます。"}, "INFP": {"role": "仲介者", "breed": "マルチーズ", "tag": "夢見るロマンチスト。理想の恋を一途に守り抜く。", "pros": ["ピュア", "献身的", "想像力豊か"], "cons": ["傷つきやすい", "理想が高い", "内に秘める"], "personality": "やさしく繊細で、心の中に大きくて美しい理想の世界を持っている人。感受性がとても豊かで、自分の価値観や「こうありたい」という想いを何よりも大切にします。空想や物語、芸術的なものに惹かれやすく、ふんわり夢見がちに見えて、その内側には譲れない強い芯を秘めています。争いごとが苦手で、まわりの空気や人の感情に影響を受けやすいぶん、人の痛みにもそっと寄り添える深いやさしさの持ち主です。", "love": "運命の相手を夢見る、ピュアでロマンチックな恋愛体質。理想がはっきりしていて、ときめきや心のつながりをとても大切にします。一度好きになるとまっすぐで献身的。相手のためなら自然と尽くしたくなり、その想いはとても深く長続きします。一方で、頭の中で理想を膨らませやすいぶん、現実とのギャップにそっと傷ついてしまうことも。本音をうまく言葉にできず、内に秘めたまま我慢してしまう一面もあります。安心できる相手の前でだけ見せる、無防備な甘え方がたまらなく可愛いコです。", "howto": "このコの世界観や感性を、否定せずまるごと受け止めてあげることが何より大切です。「わかるよ」と共感し、安心できる居場所だと感じてもらえれば、内に秘めていた想いを少しずつ打ち明けてくれます。急かしたり、現実的すぎる正論で夢を壊したりするのは禁物。やさしい言葉やちょっとしたサプライズなど、心に響くロマンチックな演出にも弱いです。「この人なら、ありのままの自分でいられる」と思わせることができれば、まっすぐで深い愛情を惜しみなく返してくれます。"}, "ENFJ": {"role": "主人公", "breed": "ゴールデン・レトリバー", "tag": "みんなの太陽。尽くして愛される愛されモテ犬。", "pros": ["愛情深い", "社交的", "尽くす"], "cons": ["尽くしすぎ", "八方美人に見える", "自己犠牲"], "personality": "明るくて面倒見がよく、まわりに自然と人が集まってくるカリスマ的な太陽タイプ。相手の気持ちを汲み取るのが得意で、場の空気をあたため、みんなを笑顔にする天性のムードメーカーです。困っている人を放っておけず、世話を焼かずにはいられないやさしさの持ち主。社交的で誰とでも仲良くなれる一方、実は人一倍まわりの評価や期待を気にしていて、内側ではいろんなことを抱え込んでがんばっている、健気な一面もあります。", "love": "とにかく愛情深く、尽くすことが大好きなロマンチスト。相手の幸せが自分の幸せで、好きな人のためなら自然と動き、惜しみなく愛を注ぎます。社交的でモテるタイプですが、本命に対してはまっすぐ一途。記念日や小さな気遣いも忘れず、相手をとことん大切にします。ただ、尽くしすぎて自分のことを後回しにしたり、同じだけの愛が返ってこないと口には出さずそっと寂しさをためてしまうことも。「みんなにやさしい」がゆえに誤解されることもある、愛情たっぷりのコです。", "howto": "このコはいつも与える側にまわりがちなので、受け取った愛情にきちんと気づき、言葉と態度でしっかり返してあげることが何より響きます。「いつもありがとう」「あなたも大切にされていいんだよ」と伝えると、張りつめていた心がふっとほどけて、あなたを特別な存在だと感じてくれます。明るくふるまっていても内側では気を張っているので、弱音をこぼせる安心できる相手になってあげると一気に距離が縮まります。一緒にいて笑顔になれるあたたかい関係を育てれば、このコは全力であなたを愛してくれます。"}, "ENFP": {"role": "運動家", "breed": "トイ・プードル", "tag": "好奇心の塊。恋を全力で楽しむムードメーカー。", "pros": ["一緒にいて楽しい", "素直", "情熱的"], "cons": ["気分屋", "飽きっぽい", "寂しがり"], "personality": "好奇心旺盛で表情ゆたか、いつも楽しいことを探している愛されムードメーカー。人懐っこくて誰とでもすぐに打ち解け、まわりを明るい空気で包み込みます。感情が素直に表に出るタイプで、嬉しいときは全身で喜び、楽しいことには全力で飛び込んでいく無邪気さが魅力。新しいものや刺激が大好きで興味の幅も広い反面、ちょっと飽きっぽく気分屋なところも。自由でカラフルな感性を持った、見ているだけで元気をもらえるようなコです。", "love": "恋を全力で楽しむ、情熱的でまっすぐなタイプ。感情表現がとても豊かで、好きになると気持ちを隠さずストレートにアピールします。ドキドキやときめきを何より大切にし、一緒にワクワクできる関係に憧れます。ノリがよく一緒にいて楽しい反面、自由を愛するので束縛は苦手。また、にぎやかに見えて実はさみしがり屋で、好きな人からの愛情をこまめに感じられないと不安になってしまうことも。気分の波はあるけれど根は一途で、心を許した相手にはまっすぐな愛情を注ぎます。", "howto": "このコと「楽しい！」を分かち合えるかどうかが最大のポイント。リアクション大きめに盛り上がり、新しい体験やサプライズで毎日に彩りを添えてあげると、目を輝かせて夢中になります。ときめきと自由を奪わないことが長続きの秘訣ですが、同時にさみしがり屋な一面もしっかりケアしてあげて。こまめな連絡や「あなたが一番だよ」というまっすぐな言葉が、不安をふっと溶かします。重くなりすぎず、でも愛情はしっかり伝える——そのバランスが、このコの心をつかみます。"}, "ISTJ": {"role": "管理者", "breed": "柴犬", "tag": "不器用で実直。一度決めたら一生ものの古風な一途者。", "pros": ["誠実", "一途", "責任感"], "cons": ["不器用", "頑固", "照れ屋"], "personality": "真面目でコツコツ努力を積み重ねる、信頼できるしっかり者。ルールや約束、筋の通ったことを何より大切にし、一度決めたことは最後までやり通す責任感の持ち主です。感情を派手に表に出すことは少なく、どこか凛として落ち着いた佇まい。流行に流されず、自分の信じる価値観を貫く硬派なタイプで、まわりからは「不器用だけど芯のある人」と一目置かれます。慣れた相手の前でだけ見せる、ふっとゆるんだ表情が可愛いコです。", "love": "恋愛もまた誠実そのもの。軽い気持ちで関係を持つことはなく、付き合うなら真剣に、長く続く安定した関係を望みます。口下手で愛情表現はとても不器用ですが、一度「この人」と決めた相手にはとことん一途で、その想いは何があっても揺るぎません。派手なロマンスより、毎日の約束をきちんと守り、地道に信頼を積み重ねていくことを大切にします。照れ屋で気持ちを言葉にするのは苦手なので、態度や行動でじわじわ愛情を示すタイプ。一見クールでも、内側にはあたたかく一途な想いを秘めています。", "howto": "派手な演出やスピード勝負は、このコにはあまり響きません。それよりも、約束を守る・連絡をまめにする・嘘をつかないといった誠実さの積み重ねが何よりの近道です。最初は警戒心から距離を感じるかもしれませんが、時間をかけて「この人は信頼できる」と思ってもらえれば、ぐっと心を開いてくれます。照れ屋なので、こちらから素直に気持ちを伝えてあげると安心するはず。焦らず誠実に向き合い続けることができれば、一度心を許したこのコは、一生もののまっすぐな愛情を返してくれます。"}, "ISFJ": {"role": "擁護者", "breed": "シーズー", "tag": "穏やかな甘え上手。さりげなく尽くす献身派。", "pros": ["気がきく", "献身的", "安心感"], "cons": ["尽くしすぎ", "本音を隠す", "遠慮がち"], "personality": "おだやかで思いやりにあふれ、まわりをそっと支える縁の下の力持ちタイプ。人の小さな変化やちょっとした不調によく気づき、さりげなく手を差し伸べられるあたたかさの持ち主です。自分から前に出るより、一歩引いて全体を見守るのが得意で、その安心感のある存在感に癒される人は少なくありません。控えめで遠慮がちな反面、大切な人を守りたいという気持ちは人一倍強く、芯の通った優しさを秘めた献身的なコです。", "love": "好きな人には、さりげなく、でもとことん尽くす献身派。自分からぐいぐい押すのは苦手ですが、相手のことをよく観察していて、痒いところに手が届く気遣いで愛情を示します。安定した穏やかな関係を望み、一度好きになった相手にはずっと寄り添い続ける一途さの持ち主。ただ、尽くしすぎて自分の気持ちを後回しにしたり、本音を言えずにため込んでしまったりする一面も。遠慮がちなので想いをアピールするのは得意ではありませんが、その分、愛情の深さと安心感は折り紙つきです。", "howto": "このコの何気ない気遣いに、きちんと気づいて言葉で返してあげることが何より大切です。「いつもありがとう」「助かってるよ」と伝えるたびに、このコの心はあたたかく満たされていきます。自分から本音を言うのが苦手なタイプなので、こちらから「どうしたい？」「無理してない？」とやさしく尋ね、気持ちを引き出してあげて。ガツガツしたアプローチより、穏やかで安心できる空気をつくることが信頼への近道です。受け取った優しさをちゃんと返す関係を築ければ、このコは生涯あなたに寄り添うパートナーになってくれます。"}, "ESTJ": {"role": "幹部", "breed": "ボストン・テリア", "tag": "きっちり紳士。計画的に着実に愛を育てる。", "pros": ["頼れる", "誠実", "面倒見がいい"], "cons": ["仕切り屋", "頑固", "ストレートすぎ"], "personality": "しっかり者でまとめ役、現実的で段取り上手な頼れるリーダータイプ。物事を計画的に進めるのが得意で、曖昧さや無責任なふるまいが大の苦手です。筋を通すことを大切にし、まわりからは「きっちりした頼れる人」として信頼を集めます。タキシードを着たような端正な見た目どおり、礼儀正しく誠実な紳士肌。面倒見がよく身近な人をしっかり支える一方、自分にも他人にも厳しくなりすぎてしまうことがある、生真面目なコです。", "love": "恋愛も計画的で誠実そのもの。あいまいな関係をだらだら続けるのは苦手で、付き合うなら真剣に、将来を見すえてきちんと向き合いたいタイプです。気になる相手にはハッキリと態度で示し、決めたらまっすぐに、着実に関係を育てていきます。サプライズや情熱的な演出より、約束を守り安定した日々を積み重ねることで愛情を表現する堅実派。少し仕切りたがりで頑固な面もありますが、それは相手を大切に思い、しっかり守りたいという責任感の裏返し。誠実で頼りがいのある、芯の通ったパートナーになります。", "howto": "このコには、ハッキリした態度と本気度を見せることが何よりの安心材料になります。あいまいに濁したり約束を軽く扱ったりすると一気に評価が下がるので、まっすぐ誠実に向き合うことが大切です。きちんとした人・芯のある人に惹かれるので、自分の考えや将来のビジョンを持っていると好印象。少し堅いところがあるので、たまに肩の力が抜けるような穏やかな時間を一緒に過ごすと、このコもふっと素の表情を見せてくれます。信頼を積み重ねれば、誰よりも頼れる一途で誠実な愛情を返してくれます。"}, "ESFJ": {"role": "領事", "breed": "ラブラドール・レトリバー", "tag": "面倒見抜群の人気者。ストレートにたっぷり愛を伝える。", "pros": ["愛情豊か", "マメ", "明るい"], "cons": ["さみしがり", "世話焼きすぎ", "嫉妬しやすい"], "personality": "社交的で世話好き、まわりのみんなに好かれる愛されキャラ。場の空気を読むのが上手で、気配りを忘れず、人を笑顔にすることに喜びを感じます。誰に対してもフレンドリーで親しみやすく、グループの輪の中心にいることが多いタイプ。明るくてエネルギッシュ、人とのつながりを何より大切にします。一方で、まわりからどう思われているかをけっこう気にしていて、嫌われたくない一心でがんばりすぎてしまう、健気で優しい一面もあります。", "love": "愛情表現はストレートで惜しみなし。好きな人にはたっぷり愛を注ぎ、記念日や小さな気遣いもまめに大切にします。一緒にいる時間やこまめなコミュニケーションを何より重視するタイプで、相手にも同じだけの愛情を返してほしいと願う、ちょっぴり甘えん坊な一面も。尽くし上手で頼れる反面、相手の反応が薄かったり連絡が途絶えたりすると、不安になって寂しさをためこんでしまいがち。やきもちを焼くこともありますが、それだけ一途に相手を想っている証拠。一緒にいてあたたかい気持ちになれるコです。", "howto": "このコを安心させるカギは、こまめな連絡と感謝の言葉。「ありがとう」「一緒にいて楽しい」とまめに伝えるだけで、このコの心は満たされ、ますますあなたに尽くしてくれます。愛情をしっかり受け取り、同じだけ返してあげることが何より大切で、リアクションが薄いと不安にさせてしまうので注意。さみしがり屋な一面をやさしくケアし、「あなたが一番だよ」と伝えてあげると一気に距離が縮まります。たっぷりの愛情に同じ熱量で応えれば、このコは惜しみなくあなたを大切にしてくれます。"}, "ISTP": {"role": "巨匠", "breed": "ミニチュア・ダックスフンド", "tag": "クールでマイペース。多くは語らないけど芯は熱い。", "pros": ["さっぱり", "自立してる", "いざという時頼れる"], "cons": ["素っ気ない", "感情を出さない", "マイペース"], "personality": "クールで物静か、でも好きなことには驚くほど没頭する職人気質のタイプ。感情を表に出すのは得意ではなく、いつも一歩引いて冷静に物事を観察しています。ベタベタした関係や過度な干渉は苦手で、自分の時間とペースを何より大切にする自立派。一見そっけなく見えますが、いざというときには的確に動き、頼りになる芯の強さを秘めています。多くは語らないぶん、ふとした行動にやさしさがにじむ、ギャップ萌えなコです。", "love": "愛情表現は控えめでクール。べたべたするより、ほどよい距離感を保ちながらお互いを信頼し合える関係を好みます。気持ちを言葉にするのは苦手で、好きな相手にもついそっけない態度をとってしまいがち。けれど、その内側には意外なほど熱い想いを秘めていて、ここぞというときには行動でしっかり愛情を示してくれます。束縛や依存は苦手ですが、自由を尊重してくれる相手の前では、少しずつ素の自分を見せるように。クールな表面の下にある、不器用であたたかい優しさが本当の魅力です。", "howto": "グイグイ迫ったり過度に干渉したりするのは逆効果。このコには、自由とペースを尊重しながらさりげなくそばにいる距離感がいちばん効きます。べたつかず、でも必要なときにはちゃんと頼れる——そんな心地よい関係を築けると、このコのほうから少しずつ心を開いてくれます。素っ気ない態度に一喜一憂せず、どっしり構えていられる相手だと安心するはず。言葉が少なくても行動にやさしさがにじむタイプなので、その小さなサインを見逃さず受け取ってあげると、不器用な愛情がじわじわ伝わってきます。"}, "ISFP": {"role": "冒険家", "breed": "フレンチ・ブルドッグ", "tag": "ゆるい癒し系。マイペースに自由に愛する平和主義。", "pros": ["癒し系", "自然体", "やさしい"], "cons": ["流されやすい", "優柔不断", "本音が読めない"], "personality": "おっとりマイペースで、自分の感性と「心地よさ」を何より大切にする癒し系。争いごとを好まず、今この瞬間を穏やかに楽しむことに価値を置きます。ゆるくて自由気ままに見えて、実は美的センスや感受性が豊かで、自分なりのこだわりをしっかり持っているタイプ。まわりに流されているようでいて、譲れない芯はちゃんとある。一緒にいるとふっと肩の力が抜けるような、あたたかくて平和な空気をまとったコです。", "love": "ゆるやかで自然体な恋を好むタイプ。重い空気や束縛、せかせかした関係は苦手で、一緒にいてラクで心地よい相手とのんびり愛を育てていきたい平和主義者です。情熱的にぐいぐい攻めるより、穏やかな時間をともに過ごすなかでじんわりと愛情を深めていきます。やさしくて流されやすい一面があり、自分の本音をはっきり言葉にしないこともしばしば。何を考えているか読みにくいと思われがちですが、それは波風を立てたくない優しさゆえ。安心できる相手の前では、無防備で甘えん坊な素顔をのぞかせます。", "howto": "急かしたりプレッシャーをかけたりするのは禁物。このコには、ゆったりと心地よい空気をつくってあげることが何よりの近道です。「一緒にいると落ち着くな」と感じてもらえれば、自然と距離は縮まっていきます。本音を言葉にするのが苦手なので、こちらから押しつけず、さりげなく気持ちを聞き出してあげて。優柔不断なところも、急かさず選択肢を整理して寄り添えば安心します。穏やかで自由な関係を尊重しながらほどよく甘えさせてあげると、このコはあなたのそばを、いちばん居心地のいい場所だと感じてくれます。"}, "ESTP": {"role": "起業家", "breed": "ビーグル", "tag": "行動あるのみ。好奇心と勢いで距離を一気に詰める。", "pros": ["行動力", "ノリがいい", "一緒にいて楽しい"], "cons": ["せっかち", "飽きっぽい", "後先考えない"], "personality": "行動力のかたまりで、好奇心旺盛なエネルギッシュタイプ。考えるより先に体が動く、ノリと勢いの天才です。新しいことや刺激的な体験が大好きで、じっとしているのが苦手。フットワークが軽く、どんな場でもすぐに打ち解け、まわりを巻き込んで盛り上げるムードメーカーでもあります。後先をあまり考えずに突っ走ってしまう面はあるものの、その裏表のない明るさと行動力で一緒にいる人を退屈させません。元気いっぱいで憎めない、愛されキャラです。", "love": "気になったら即アプローチ。スピード感とノリを大切にする、情熱的でストレートな恋愛タイプです。好きな相手には勢いよく距離を詰め、一緒にワクワクできる体験を共有することで愛を深めていきます。じっくり考えるより、まず動いて確かめたい派なので、関係の進展も早め。刺激と楽しさを求めるぶんマンネリには弱く、退屈な関係には熱が冷めてしまうことも。けれど、本当に気の合う相手とは、遊び仲間のように笑い合いながら自然体で長く続く関係を築けます。一緒にいて飽きない、最高に楽しいパートナーです。", "howto": "このコを落とすカギは、テンポのよさと「一緒に楽しむ」姿勢。ノリよくリアクションを返し、アクティブなデートや新しい体験に一緒に飛び込んであげると、ぐっと距離が縮まります。回りくどい駆け引きより、ストレートでわかりやすいやりとりを好むので、好意も素直に伝えるのが正解。退屈させないことが何より大事なので、二人で笑える時間や刺激をどんどん共有して。一緒にいてワクワクできる相手だと思ってもらえれば、このコは持ち前の行動力でまっすぐにあなたへ突き進んできます。"}, "ESFP": {"role": "エンターテイナー", "breed": "ポメラニアン", "tag": "華やかな恋の主役。かまってほしい愛されたがり。", "pros": ["一緒にいて華やか", "素直", "情熱的"], "cons": ["さみしがり", "嫉妬深い", "かまってちゃん"], "personality": "明るく華やかで、その場の主役になれる天性のエンターテイナー。ノリがよく人を楽しませることが大好きで、いるだけでその場がぱっと明るくなるような存在感の持ち主です。感情ゆたかでリアクション大きめ、好きなものに囲まれてキラキラ過ごす時間に幸せを感じます。注目を浴びるのが好きで、ちょっぴりかまってほしがりな一面も。にぎやかで楽しいことが大好きな反面、実はさみしがり屋で、一人で放っておかれるのは苦手な愛されたがりなコです。", "love": "恋の主役はいつだって自分。ドラマチックでロマンチックな恋に憧れ、好きな人の前ではめいっぱい可愛く、まっすぐに愛情を表現します。情熱的で素直なぶん、相手にも同じだけの熱量とかまってほしさを求める甘えん坊。こまめに愛を感じられないと不安になり、ときにヤキモチを焼いてしまうことも。でもそれは、それだけ一途にあなたを想っている証拠です。たっぷり愛されて特別扱いされると、このコは誰よりも輝き、惜しみない愛情と笑顔を返してくれます。一緒にいると毎日が華やぐ太陽みたいなコです。", "howto": "このコを満たすコツは、とにかくこまめにかまって「あなたは特別だよ」とちゃんと言葉で伝えること。愛されている実感があるほど、このコは安心して全力であなたを愛してくれます。リアクション大きめに褒めたり、一緒に楽しい時間を演出したりすると大喜び。さみしがり屋なので、放っておかれる時間が長いと不安になってしまう点には気をつけて。ヤキモチも愛情の裏返しと受け止め、まっすぐな愛情で応えてあげましょう。たっぷりの愛情と特別感をプレゼントできれば、このコは最高の笑顔であなたの毎日を彩ってくれます。"}}, "en": {"INTJ": {"role": "Architect", "breed": "Chihuahua", "tag": "Tiny body, fierce pride. A schemer who opens up only to the one.", "pros": ["Loyal", "Smart", "Unwavering"], "cons": ["Not openly honest", "Wary", "Proud"], "personality": "A confident little one carrying more pride than anyone, packed into a tiny body. Quick-thinking and always reading a step ahead, this dog keeps its own world and rules and rarely runs with the crowd. People see it as cool and a little mysterious. The wall around its heart is high and its guard is strong, yet once you are let inside, that aloof attitude melts into surprising sweetness. That huge gap is its greatest charm.", "love": "Even in love there is a cool strategist at work. It does not wag its tail for just anyone; it quietly decides whether you are the real thing before it moves. So once it picks you, it falls hard enough to lose sight of everything else. The surface stays cool, but jealousy and a possessive streak grow inside, and seeing you close with someone else is quietly unbearable. Deep down it knows it would be unstoppable if it could just be openly affectionate.", "howto": "A casual or flirty approach backfires completely. The first step is to honor its pride and let it feel you can talk as a sharp, equal partner. No flattery needed; it is drawn to people with opinions of their own. On top of that, let it feel it is special to you, lightly but sincerely. Patience is everything. Build trust little by little, and one day it will suddenly let its guard down and lean on you."}, "INTP": {"role": "Logician", "breed": "Miniature Schnauzer", "tag": "An over-thinking philosopher who analyzes love, yet falls hard once hooked.", "pros": ["Creative", "No clinginess", "Deep thinker"], "cons": ["Oblivious", "Slow to act", "Over-logical"], "personality": "A ball of curiosity and inquiry, with a head perpetually full of thoughts: the philosopher type. Easygoing, it dives deep into whatever fascinates it while being startlingly indifferent to anything it finds pointless. With its own angles and logic, it strikes people as a bit odd but interesting. Showing emotion is not its strong suit, and it keeps friendships narrow and deep. Rather than lively crowds, this one shines in quiet conversations with someone it clicks with.", "love": "It tends to turn even romance into something to analyze. While it ponders whether this is love or just curiosity, it often misses the crucial moment. Its approach is shy and clumsy, but once it concludes that this is the one, its affection runs deep and true. It dislikes being tied down and values a distance where both worlds are respected. It says little, yet it observes you closely and shows a kindness that hits the heart at unexpected moments.", "howto": "Rather than pushing with emotion, conversation that sparks its intellect is the surest route. With someone it can think alongside and share discoveries with, it opens up naturally. Slow replies or flat reactions are not disinterest; it is simply choosing its words carefully in its head. Do not rush it; respect its pace. Make it feel that being with you is easy and fun, and you win. Before it knows it, it is the one who cannot let you go."}, "ENTJ": {"role": "Commander", "breed": "Corgi", "tag": "A bossy little queen. A dependable leader who pulls you along.", "pros": ["Dependable", "Decisive", "Devoted"], "cons": ["Too controlling", "Competitive", "Hates showing weakness"], "personality": "A born leader who heads straight for the goal. Quick to decide and brimming with drive, this is a dependable one that naturally pulls others along. Skilled at taking charge, it ends up at the center of any group. Competitive and hardworking, with sky-high ambition, it cannot stand stagnation or excuses. Just like its proud stance on short legs, its refusal to fret over little things is charming. That said, its perfectionism can make it hard on itself and others.", "love": "In love it wants to hold the reins, designing the dates and the pace of the relationship itself. It approaches a crush directly and with a plan, and dislikes letting a vague situation drag on. With a strong urge to protect and support, once it decides this is the one it leads with everything and gives generously. It thrives on being relied upon, so it is wonderfully dependable. But its pride makes showing weakness hard, so it often shoulders things alone when it really wants to be doted on.", "howto": "This one delights in being relied upon, so leaning on it and bringing it your worries works well. Say honestly that you feel safe with it, and it will redouble its efforts to support you. On top of that, gently catch the rare moments of weakness and true feeling it shows, and the cuteness beneath the stern leader mask quickly draws you closer. A relationship of equals who can speak their minds is welcome too. More than flattery, it is people with a clear center of their own who capture this ones heart."}, "ENTP": {"role": "Debater", "breed": "Jack Russell Terrier", "tag": "A witty, playful free spirit who never lets you get bored.", "pros": ["Fun to talk to", "Active", "Positive"], "cons": ["Easily bored", "Smooth talker", "Hard to pin down"], "personality": "Quick-witted and a smooth talker who livens up any room, this one is a crowd favorite. Mad for novelty and fun, it hates sitting still and is always hunting the next thrill. A creative idea machine, it loves debate and a bit of wordplay. Light on its feet, it acts the moment it gets an idea. With that energy and freedom, it keeps everyone around it excited. It may get bored easily, but no one beats its curiosity.", "love": "Boredom is its greatest enemy. It dislikes ruts and predictable routines, always craving fresh stimulation and a little thrill. It enjoys the chase and would rather pursue than be pursued. It closes in on a crush with witty banter, but if you are too easy to win, its interest can cool in an instant. On the other hand, someone who reveals a side it did not expect, or who can spar with it intellectually, makes it fall for real. It loves freedom and dislikes being tied down, yet around someone it trusts it shows a surprisingly loyal face.", "howto": "The key to winning this one is, simply, never letting it get bored. Offer unpredictable turns and new experiences to share, and its eyes light up with fascination. It also adores a good back-and-forth of clever conversation, so quick comebacks score points. The trick, though, is not to reveal everything: leave a little mystery. Make it think there is still so much it does not know about you, and this born chaser will close the distance on its own."}, "INFJ": {"role": "Advocate", "breed": "Cavalier", "tag": "A doe-eyed idealist who gives one person a quiet, deep love.", "pros": ["Caring", "Loyal", "Perceptive"], "cons": ["Bottles things up", "High ideals", "Shy"], "personality": "Gentle and thoughtful, this one reads the subtleties of feeling with startling sensitivity. Its ideals are high, and though it hides it, a fierce, unshakable conviction lives deep inside. Rather than wide acquaintance, it prefers deep bonds with a precious few, and its quiet way of standing beside another in pain is its charm. Behind those soft eyes a lot is turning, and at times it bottles up even its own emotions. Quiet on the surface, it is deeply strong at the core.", "love": "In love it has a romantic streak that seeks fate and a deep connection. It rarely dates casually, opening its heart only slowly after carefully gauging the other persons inner world and values. So once it believes in someone, it loves them deeply and loyally, as if giving its whole self. Perceptive, it reads even unspoken feelings and is kind, yet it struggles to show its own true feelings or weakness and tends to carry them alone. When understood, it can finally relax and entrust its heart.", "howto": "Do not rush. More than surface excitement, what matters most is taking time until it feels it can tell you its true feelings. Listen without interrupting and show that you share its values, and the firmly closed door opens little by little. It is drawn less by looks or status than by the moment it feels an inner connection. And turn your attention to this ever-attentive one too: gently ask what it wants, and it feels deeply fulfilled, treasuring you as the only one."}, "INFP": {"role": "Mediator", "breed": "Maltese", "tag": "A dreamy romantic who guards an ideal love with all their heart.", "pros": ["Pure-hearted", "Devoted", "Imaginative"], "cons": ["Sensitive", "High ideals", "Keeps it inside"], "personality": "Gentle and delicate, with a vast, beautiful ideal world inside. Highly sensitive, it treasures its own values and its sense of who it wants to be above all. Drawn to daydreams, stories, and the artistic, it seems softly dreamy, yet within it holds an uncompromising core. It dislikes conflict and is easily affected by the mood around it and by others feelings, which gives it a deep kindness that can quietly stand beside someones pain.", "love": "A pure, romantic soul who dreams of a destined partner. Its ideals are clear, and it deeply treasures flutter and heart-to-heart connection. Once it falls, it is straightforward and devoted; it naturally wants to give for the other and its feelings run deep and last. On the other hand, prone to inflating ideals in its head, it can be quietly hurt by the gap with reality. It struggles to put true feelings into words and sometimes endures while keeping them inside. The defenseless way it lets itself be doted on, shown only to someone safe, is irresistibly sweet.", "howto": "What matters most is accepting this ones world and sensibility without denying any of it. Empathize with an I get it, and once it feels you are a safe place, it will slowly confide the feelings it kept inside. Do not rush it or shatter its dreams with too much cold logic. It is also weak to gentle words and little surprises: romantic touches that reach the heart. Make it feel it can be exactly itself with you, and it returns a straightforward, deep love without holding back."}, "ENFJ": {"role": "Protagonist", "breed": "Golden Retriever", "tag": "A sunshine type, devoted to others and loved by everyone.", "pros": ["Loving", "Sociable", "Devoted"], "cons": ["Over-gives", "Seems a people-pleaser", "Self-sacrificing"], "personality": "Bright and caring, a charismatic sunshine type that people naturally gather around. Skilled at reading feelings, it warms the ro se small signs and its clumsy love comes through bit by bit."}, "ISFP": {"role": "Adventurer", "breed": "French Bulldog", "tag": "A laid-back healing type who loves freely at their own pace.", "pros": ["Soothing", "Down-to-earth", "Kind"], "cons": ["Easily swayed", "Indecisive", "Hard to read"], "personality": "Mild and easygoing, a healing type that treasures its own sensibility and comfort above all. Disliking conflict, it values enjoying this very moment calmly. It looks loose and free, but in fact it has rich aesthetic sense and sensitivity and holds firm preferences of its own. It may seem to go with the flow, yet it has a core it will not yield. It wears a warm, peaceful air that makes your shoulders relax just by being together.", "love": "A type that prefers an easygoing, natural love. It dislikes heavy moods, being tied down, and frantic relationships, and as a peace-lover it wants to grow love leisurely with someone comfortable to be around. Rather than pressing passionately, it deepens affection bit by bit through calm time spent together. Gentle and a touch easily swayed, it often does not state its true feelings clearly. It is thought hard to read, but that is the kindness of not wanting to make waves. Before someone safe, it peeks out a defenseless, doting face.", "howto": "Rushing or applying pressure is off-limits. For this one, creating a relaxed, comfortable atmosphere is the surest route. Let it feel calm being with you, and the distance closes naturally. Bad at voicing true feelings, it helps not to push but to gently draw them out. For its indecisive side too, it feels reassured if you organize the options and stand by it without rushing. Respect a calm, free relationship while letting it be doted on just enough, and this one will come to feel that being beside you is the comfiest place of all."}, "ESTP": {"role": "Entrepreneur", "breed": "Beagle", "tag": "All action. Closes the distance fast with curiosity and momentum.", "pros": ["Proactive", "Game for anything", "Fun to be with"], "cons": ["Impatient", "Easily bored", "Acts without thinking"], "personality": "A bundle of drive, the curious and energetic type. Its body moves before it thinks: a genius of vibe and momentum. It loves novelty and thrilling experiences and hates sitting still. Light on its feet, it warms up anywhere instantly and is a mood-maker who sweeps others up. It can charge ahead without much thought, but its straightforward brightness and drive keep company from ever being bored. Full of energy and impossible to dislike: a beloved one.", "love": "See someone it likes and it approaches at once. A passionate, straightforward romantic that values speed and vibe, it closes in boldly on a crush and deepens love by sharing exciting experiences. Rather than mulling things over, it would rather move and find out, so the relationship progresses quickly too. Craving stimulation and fun, it is weak to ruts and can cool toward a dull relationship. But with someone it truly clicks with, it builds a natural, lasting bond, laughing together like playmates. A partner who never gets old and is the most fun to be with.", "howto": "The key to winning this one is good tempo and a lets-enjoy-it-together attitude. React with good vibes, get excited together, and dive into active dates and new experiences, and the distance closes fast. It prefers straightforward, clear exchanges over roundabout games, so conveying your liking honestly is the right move. Since not boring it matters most, keep sharing times you can both laugh in and little thrills. Let it think you are someone it can be excited with, and this one drives straight toward you with its trademark momentum."}, "ESFP": {"role": "Entertainer", "breed": "Pomeranian", "tag": "The dazzling star of romance who craves attention and to be adored.", "pros": ["Lights up the room", "Honest", "Passionate"], "cons": ["Gets lonely", "Jealous", "Attention-seeking"], "personality": "Bright and dazzling, a born en 생각인지 알기 어렵다고들 하지만, 그건 풍파를 일으키기 싫은 다정함 때문. 안심되는 상대 앞에서는 무방비하고 응석받이인 본모습을 내비쳐요.", "howto": "재촉하거나 압박하는 건 금물. 이 친구에겐 느긋하고 편안한 분위기를 만들어 주는 것이 무엇보다 지름길이에요. \"함께 있으면 마음이 편해\"라고 느끼게 하면 자연스레 거리가 좁혀져요. 진심을 말로 옮기는 게 서툴어, 이쪽에서 강요하지 말고 슬며시 마음을 끌어내 주세요. 우유부단한 면도, 재촉하지 않고 선택지를 정리해 곁에 있어 주면 안심해요. 잔잔하고 자유로운 관계를 존중하며 적당히 응석을 받아주면, 이 친구는 당신 곁을 가장 편안한 자리로 느껴요."}, "ESTP": {"role": "사업가", "breed": "비글", "tag": "일단 행동파. 호기심과 추진력으로 단숨에 거리를 좁히는 타입.", "pros": ["행동력", "잘 맞춰 놀아줌", "함께 있으면 즐거움"], "cons": ["성급함", "쉽게 질림", "앞뒤 안 가림"], "personality": "행동력 덩어리에 호기심 왕성한 에너지 넘치는 타입. 생각보다 몸이 먼저 움직이는, 노는 흥과 추진력의 천재예요. 새롭고 자극적인 경험을 아주 좋아하고 가만히 있는 걸 못 견뎌요. 행동이 가벼워 어떤 자리에서도 금세 어울리고, 주위를 끌어들여 분위기를 띄우는 분위기 메이커이기도 해요. 앞뒤 별로 안 가리고 돌진하는 면은 있어도, 그 꾸밈없는 밝음과 행동력으로 함께 있는 사람을 지루하게 하지 않아요. 기운 넘치고 미워할 수 없는 사랑받는 캐릭터예요.", "love": "마음에 들면 즉시 어필. 속도감과 흥을 소중히 하는, 열정적이고 직설적인 연애 타입이에요. 좋아하는 상대에게 기세 좋게 거리를 좁히고, 함께 설렐 경험을 나누며 사랑을 깊여가요. 곰곰이 생각하기보다 일단 움직여 확인하고 싶은 쪽이라 관계 진전도 빠른 편. 자극과 즐거움을 원하는 만큼 매너리즘엔 약해, 지루한 관계엔 식어버리기도 해요. 하지만 정말 잘 맞는 상대와는 놀이 친구처럼 웃으며 자연스레 오래가는 관계를 쌓아요. 함께 있으면 질리지 않는 최고로 즐거운 파트너예요.", "howto": "이 친구를 사로잡는 열쇠는 좋은 템포와 \"함께 즐기는\" 자세. 흥 있게 리액션하고 함께 신나며, 액티브한 데이트나 새로운 경험에 함께 뛰어들면 거리가 단숨에 좁혀져요. 빙빙 도는 밀당보다 직설적이고 알기 쉬운 소통을 좋아하니, 호감도 솔직히 전하는 게 정답. 지루하게 하지 않는 게 무엇보다 중요하니, 둘이 웃을 시간과 자극을 자꾸 나눠 주세요. 함께 설렐 수 있는 상대라고 느끼게 하면, 이 친구는 특유의 행동력으로 당신에게 곧장 달려와요."}, "ESFP": {"role": "연예인", "breed": "포메라니안", "tag": "화려한 연애의 주인공. 관심받고 사랑받고 싶어 하는 타입.", "pros": ["함께 있으면 화려함", "솔직함", "열정적"], "cons": ["외로움을 탐", "질투가 많음", "관심받고 싶어함"], "personality": "밝고 화려해 그 자리의 주인공이 될 수 있는 타고난 엔터테이너. 흥이 많고 사람을 즐겁게 하는 걸 아주 좋아해, 있는 것만으로 그 자리가 환해지는 존재감의 소유자예요. 감정이 풍부하고 리액션이 큼직하며, 좋아하는 것들에 둘러싸여 반짝이는 시간에 행복을 느껴요. 주목받는 걸 좋아하고 살짝 관심받고 싶어 하는 면도. 시끌벅적하고 즐거운 걸 좋아하는 반면, 사실 외로움을 타서 혼자 방치되는 걸 못 견디는, 사랑받고 싶은 친구예요.", "love": "연애의 주인공은 언제나 자신. 드라마틱하고 로맨틱한 사랑을 동경해, 좋아하는 사람 앞에서는 한껏 귀엽게 곧은 애정을 표현해요. 열정적이고 솔직한 만큼, 상대에게도 같은 온도와 관심을 바라는 응석받이. 자주 사랑을 못 느끼면 불안해지고 때로 질투하기도. 하지만 그건 그만큼 일편단심으로 당신을 생각하는 증거예요. 듬뿍 사랑받고 특별 대접을 받으면, 이 친구는 누구보다 빛나며 아낌없는 애정과 미소를 돌려줘요. 함께 있으면 매일이 화려해지는 태양 같은 친구예요.", "howto": "이 친구를 채우는 비결은 무엇보다 자주 관심을 주고 \"너는 특별해\"라고 또렷이 말로 전하는 것. 사랑받는 실감이 클수록 안심하고 전력으로 당신을 사랑해요. 리액션을 크게 하며 칭찬하고 함께 즐거운 시간을 연출하면 아주 기뻐해요. 외로움을 타니 방치되는 시간이 길면 불안해지는 점은 주의. 질투도 애정의 이면으로 받아들이고 곧은 애정으로 답해 주세요. 듬뿍한 애정과 특별함을 선물하면, 이 친구는 최고의 미소로 당신의 매일을 물들여줘요."}}, "zh": {"INTJ": {"role": "建筑师", "breed": "吉娃娃", "tag": "娇小身躯却满是傲气，只对真命之人敞开心扉的策略家。", "pros": ["专一", "聪明", "坚定"], "cons": ["不够坦率", "戒心强", "自尊心强"], "personality": "娇小身躯里却藏着比谁都强的自信与自尊，是个有主见的小家伙。脑筋转得快，总是先想一步而后动；不爱扎堆，有自己的一套世界和规则，因此在旁人眼里常显得「酷酷的、有点神秘」。戒心强、心墙也高，可一旦把你放进墙内，那副高冷的样子就会反差般化作满满的撒娇。这种巨大的反差，正是它最大的魅力。", "love": "谈恋爱时也带着几分冷静的策略家气质。它不会对谁都摇尾巴，而是先在心里判断「这个人是不是真心」才行动。所以一旦认定「就是你」，便会专一到几乎看不见周围。表面再冷，内心也悄悄滋长着醋意与占有欲，看到喜欢的人和别的异性亲近，心里其实并不平静。它自己也明白：要是能坦率撒娇就无敌了。", "howto": "轻浮或油嘴滑舌的接近完全是反效果。尊重它的自尊，让它觉得你是能平等、有深度交流的对象，才是打开那扇紧闭心门的第一步。不必讨好，它反而更欣赏有自己主见的人。在此之上，把「你很特别」的心意低调却笔直地传达给它。切忌心急。花时间慢慢累积信任，总有一天它会忽然卸下防备、向你撒娇依赖。"}, "INTP": {"role": "逻辑学家", "breed": "迷你雪纳瑞", "tag": "爱讲道理的哲学家，分析过头，但一旦沦陷便专情到底。", "pros": ["想法有趣", "不束缚", "深思熟虑"], "cons": ["迟钝", "行动迟缓", "爱讲道理"], "personality": "好奇心与求知欲爆棚，脑子里永远塞满想法的哲学家型。我行我素，对感兴趣的事会一头扎进去钻研，对无所谓的事却出奇地漠不关心。有自己独到的视角与逻辑，常被看作「有点怪却很有趣的人」。不擅长把情绪表露在外，交友也偏少而深。比起热闹场合，它更在与合拍之人安静畅谈的时光里闪闪发光。", "love": "连恋爱都会忍不住拿来分析。在纠结「这是爱，还是单纯感兴趣」的时候，往往错过关键时机。它的接近含蓄又笨拙，但一旦确信「就是这个人」，那份爱便又深又直。它不喜被束缚，珍惜彼此世界都被尊重的距离感。话不多，却在默默观察你，会在不经意间露出一针见血的温柔。", "howto": "与其用情绪猛攻，不如用激发它求知欲的对话，这才是最快的捷径。遇到能一起思考、能分享新发现的对象，它会自然敞开心扉。回复慢、反应淡，并不是没兴趣，只是在脑中慢慢斟酌措辞而已。别催它，尊重它的节奏。只要让它觉得「和你在一起轻松又愉快」就大功告成。不知不觉间，反倒是它离不开你了。"}, "ENTJ": {"role": "指挥官", "breed": "柯基犬", "tag": "爱掌控的女王，强势带路、可靠的领导者。", "pros": ["可靠", "果断", "愿付出"], "cons": ["太爱掌控", "好胜", "不善示弱"], "personality": "朝目标一路直行的天生领导型。决断快、行动力也超强，是能自然带动周围的可靠存在。擅长统筹，在团体里不知不觉就成了中心。好胜又努力，上进心过人，最受不了停滞与借口。就像它用短腿也挺胸抬头的模样，不为小事纠结的爽快是它的魅力。不过因为完美主义，对己对人都容易偏严。", "love": "恋爱中也想掌握主导权，约会和关系的推进都想由自己设计。对心仪对象会直接又有计划地出击，不喜欢把暧昧拖来拖去。保护欲、支撑欲都很强，一旦认定「就是你」，便会全力带领、毫不吝啬地付出。被依赖就会燃，所以可靠得很。只是自尊高、不善示弱，其实更想撒娇，却常常一个人扛着。", "howto": "这只很享受被依赖，所以大胆地撒娇、找它倾诉很有效。坦率地说「有你在我很安心」，它会更加卖力地支撑你。在此之上，温柔地接住它偶尔流露的脆弱与真心，坚硬领导面具下的可爱便会让距离迅速拉近。能平等交换意见的关系也大受欢迎。比起讨好，有自己主心骨的对象更能牢牢抓住它的心。"}, "ENTP": {"role": "辩论家", "breed": "杰克罗素梗", "tag": "机智又调皮，从不让人无聊、热爱刺激的自由派。", "pros": ["聊天有趣", "行动派", "乐观"], "cons": ["易腻", "能言善道", "捉摸不定"], "personality": "脑筋转得快、口才也好，到哪儿都能炒热气氛的人气王。对新鲜有趣的事毫无抵抗力，受不了枯坐，总在寻找下一个刺激。点子多得像创意机器，热爱辩论和一点小小的文字游戏。身手轻快，想到就立刻行动。凭那股活力与自由，它总让周围充满期待。虽有点容易腻，但论好奇心谁也比不过。", "love": "无聊才是最大的敌人。它讨厌一成不变和按部就班的关系，总渴望新鲜刺激和一点小惊险。喜欢欲擒故纵，比起被追更想去追。对心仪对象会用机智言语一路拉近，可若太轻易到手，热度也会瞬间冷却。反过来，能让它看到意外一面、能在智识上过招的对象，反而会让它难得地认真沦陷。爱自由、怕束缚，但在信得过的人面前，也会露出意外专一的一面。", "howto": "拿下这只的关键，一言以蔽之就是「别让它无聊」。准备出人意料的展开和能一起体验的新鲜事，它就会眼睛发亮、深陷其中。它也最爱机智对话的你来我往，能轻巧接招的人加分。不过诀窍是别全盘托出，留一点神秘。让它觉得「这个人，好像还有好多我不知道的一面」，爱追的它便会主动沦陷、拉近距离。"}, "INFJ": {"role": "提倡者", "breed": "查理王小猎犬", "tag": "眼神温润的理想主义者，只对一人付出安静而深沉的爱。", "pros": ["体贴", "专一", "善解人意"], "cons": ["爱憋在心里", "理想高", "认生"], "personality": "温柔又深思熟虑，对人心的微妙之处敏感得惊人。理想很高，虽不外露，内心深处却藏着炽热而不动摇的信念。比起广泛结交，它更喜欢与少数珍视之人深深相连，那份静静陪在他人痛苦旁的包容力正是魅力。湿润的眼眸背后想着许多事，有时连自己的情绪也一并扛下。看似安静，内核却极其坚强，是个很有深度的孩子。", "love": "在恋爱里有着渴求命运与深度联结的浪漫一面。它几乎不会轻率交往，而是仔细衡量对方的内在与价值观后，才慢慢敞开心扉。所以一旦相信「就是这个人」，便会像献出全部般又深又专地去爱。它善解人意，连没说出口的心情都能体察并给予温柔，却很难展露自己的真心与脆弱，容易一个人扛着。被理解的那一刻，才能真正安心地把心交托。", "howto": "切忌心急。比起表面的热闹，花时间让它觉得「对这个人能说真心话」才最重要。不打断、用心倾听，并对它的价值观表示共鸣，那扇紧闭的心门便会一点点打开。比起外貌或条件，它更在感到内在联结的瞬间被深深吸引。同时也别忘了把目光投向总在体贴你的它，温柔地问一句「你想怎么做？」，它会深深被满足，把你视作唯一而珍惜。"}, "INFP": {"role": "调停者", "breed": "马尔济斯", "tag": "爱做梦的浪漫主义者，专一守护心中理想的爱情。", "pros": ["纯真", "奉献", "想象力丰富"], "cons": ["易受伤", "理想高", "藏在心里"], "personality": "温柔细腻，心中拥有一个又大又美的理想世界。感受性极其丰富，把自己的价值观和「想成为怎样的人」看得比什么都重。容易被幻想、故事与艺术吸引，看似软软地爱做梦，内里却藏着不肯退让的坚强内核。不喜争执，容易受周遭气氛与他人情绪影响，正因如此也拥有能悄悄陪在他人痛苦旁的深深温柔。", "love": "梦想着命运对象、纯真而浪漫的恋爱体质。理想清晰，把心动与心灵相连看得极重。一旦喜欢便又直又奉献，会自然而然想为对方付出，那份心意又深又长久。另一方面，因为容易在脑中把理想放大，也会被理想与现实的落差悄悄刺伤。不擅长把真心化为言语，常常藏在心里独自忍耐。只在安心的对象面前才展露的、毫无防备的撒娇，可爱得让人受不了。", "howto": "最重要的，是不否定地把它的世界观与感性整个接住。用一句「我懂」表示共鸣，让它觉得你是安心的归处，它便会一点点吐露藏在心底的心意。切忌催促，也别用太现实的大道理打碎它的梦。它也很吃温柔的话语和小惊喜这类触动心弦的浪漫。只要让它觉得「和这个人能做最真实的自己」，它便会毫不保留地回以又直又深的爱。"}, "ENFJ": {"role": "主人公", "breed": "金毛寻回犬", "tag": "人人的太阳，懂得付出又惹人爱的万人迷。", "pros": ["深情", "善社交", "愿付出"], "cons": ["付出过头", "像八面玲珑", "自我牺牲"], "personality": "开朗又会照顾人，是身边自然聚人的领袖型太阳。擅长体察心情，能炒热气氛、让大家展露笑容，是天生的气氛制造机。见不得别人为难，忍不住要去照顾人，满是温柔。善社交、和谁都合得来，其实却格外在意周围的评价与期待，内心常默默扛下许多、强撑着的一面也很惹人疼。", "love": "总之深情，又超爱付出的浪漫主义者。对方的幸福就是自己的幸福，为喜欢的人会自然行动、毫不吝啬地倾注爱意。虽然善社交又受欢迎，对真心之人却笔直专一。纪念日和小体贴都不会忘，把对方珍视到极致。只是会因付出过头而把自己放在最后，或在得不到同等回报时不声不响地把寂寞攒下来。正因「对谁都温柔」，有时也会被误会，是个满满都是爱的孩子。", "howto": "这只总在付出的一方，所以好好察觉你收到的爱、用言语和行动确实回应，最能打动它。一句「一直谢谢你」「你也值得被珍惜」，会让它紧绷的心忽然松开，感到你是特别的存在。它再开朗，内心也在紧绷，所以成为它能吐露脆弱、令它安心的人，距离会迅速拉近。培养出彼此都能展露笑容的温暖关系，它便会全力去爱你。"}, "ENFP": {"role": "竞选者", "breed": "玩具贵宾犬", "tag": "好奇心爆棚，全力享受恋爱的气氛制造机。", "pros": ["相处愉快", "率真", "热情"], "cons": ["情绪化", "易腻", "怕寂寞"], "personality": "好奇心旺盛、表情丰富，总在寻找乐子的人见人爱的气氛制造机。亲人到不行，和谁都能立刻打成一片，用明亮的气场把周围包裹。情绪坦率外露，开心时全身雀跃，对好玩的事会全力扑上去，那份天真正是魅力。爱新鲜爱刺激、兴趣面也广，另一面却有点容易腻、易情绪化。拥有自由多彩的感性，光是看着就让人元气满满。", "love": "全力享受恋爱、热情又笔直的类型。情绪表达极其丰富，一旦喜欢就不藏心意、直接示好。把心动与悸动看得最重，憧憬能一起雀跃的关系。好玩又好相处，另一面却因为爱自由而怕被束缚。而且看似热闹，其实是个怕寂寞的孩子，若不能时常感到喜欢之人的爱，就会变得不安。情绪虽有起伏，本质却专一，对敞开心扉的对象会倾注笔直的爱。", "howto": "能不能和这只共享「真开心！」，是最大的关键。反应大一点、一起嗨起来，用新体验和小惊喜为日常添彩，它就会眼睛发亮、深陷其中。不夺走它的心动与自由是长久的秘诀，但同时也要好好照顾它怕寂寞的一面。勤快的联系和一句笔直的「你是第一名」，能把不安悄悄融化。别太沉重，但爱意要确实传达——这个平衡，正能抓住这只的心。"}, "ISTJ": {"role": "物流师", "breed": "柴犬", "tag": "笨拙却老实，一旦认定便一生一世的传统专情派。", "pros": ["诚实", "专一", "有责任感"], "cons": ["笨拙", "固执", "害羞"], "personality": "认真又肯一点点积累努力，是值得信赖的踏实型。把规则、约定和合乎情理的事看得比什么都重，一旦决定就贯彻到底，责任感十足。很少把情绪张扬地表现出来，带着几分凛然沉稳的气质。不随波逐流，坚守自己相信的价值观，是个让人刮目的「笨拙却有主心骨的人」。只在熟悉的对象面前才偶尔露出的、忽然放松下来的神情，格外可爱。", "love": "恋爱也是诚实本身。不会轻率发展关系，要交往就认真，盼望长久稳定的关系。嘴笨、表达爱意也很拙，但一旦认定「就是你」，便专一到底，那份心意无论如何都不动摇。比起华丽的浪漫，它更看重守住每天的约定、踏实累积信任。因为害羞，不擅长把心意化为言语，多用态度和行动慢慢表达爱。看似冷，内里却藏着温暖又专一的心。", "howto": "华丽的排场或速度战，对这只并不太奏效。比起这些，守约、勤联系、不说谎这类诚意的累积才是最快的捷径。起初它的戒心可能让你觉得有距离，但花时间让它觉得「这个人可以信」，它便会大大敞开心扉。它害羞，由你先坦率传达心意，它会安心。不急不躁、持续真诚地相待，一旦它放你进来，便会回以一生一世的笔直爱意。"}, "ISFJ": {"role": "守卫者", "breed": "西施犬", "tag": "温柔又会撒娇，默默付出的奉献型。", "pros": ["体贴", "奉献", "有安全感"], "cons": ["付出过头", "藏真心", "太客气"], "personality": "温和又满是体贴，是默默支撑周围的幕后功臣型。很会留意他人的细微变化和小小的不适，拥有不动声色伸出援手的温暖。比起自己站出来，更擅长退一步守望全局，被它那份令人安心的存在感治愈的人不在少数。看似低调、爱客气，守护重要之人的心意却格外强烈，是个藏着有骨气温柔的奉献型。", "love": "对喜欢的人，会不动声色却彻底地付出。不擅长主动猛攻，却把对方观察得很细，用挠到痒处的体贴表达爱意。盼望稳定平和的关系，一旦喜欢上某人便会一直陪伴的专一型。只是会因付出过头把自己的心情放在后面，或说不出真心而憋在心里。因为爱客气，不擅长展示心意，但正因如此，爱的深度与安心感都有保证。", "howto": "好好察觉这只不经意的体贴，并用言语回应，最为重要。每说一次「一直谢谢你」「多亏有你」，它的心就被暖暖填满。它不擅长主动说真心，所以由你温柔地问「你想怎么做？」「没勉强吧？」，把它的心意引出来。比起咄咄逼人的接近，营造平和安心的氛围才是通往信任之路。建立起好好回报所受温柔的关系，这只便会成为一生陪在你身边的伴侣。"}, "ESTJ": {"role": "总经理", "breed": "波士顿梗", "tag": "一丝不苟的绅士，按计划稳扎稳打地经营爱情。", "pros": ["可靠", "诚实", "会照顾人"], "cons": ["爱指挥", "固执", "太直白"], "personality": "踏实的统筹者，现实又擅长安排，是可靠的领导型。擅长有计划地推进事情，最受不了含糊与不负责任的举动。看重讲道理，被周围当作「一丝不苟、靠得住的人」信赖。就像它穿着燕尾服般端正的外表，是位有礼又诚实的绅士。会照顾人、稳稳支撑身边人，另一面却有时对己对人都过于严格，是个一本正经的孩子。", "love": "恋爱也讲计划、诚实本身。不喜把暧昧拖来拖去，要交往就认真、着眼未来好好面对。会用态度向心仪对象表明心意，一旦决定便笔直又踏实地经营关系。比起惊喜或热情的排场，更靠守约、累积稳定的日子来表达爱，是稳健派。略有些爱指挥、固执，但那是珍视并想守护对方的责任感的反面。会成为诚实可靠、有主心骨的伴侣。", "howto": "对这只，展现明确的态度与认真的诚意最能让它安心。含糊其辞或轻看约定，好感会迅速下跌，所以笔直诚实地面对最关键。它欣赏端正、有主心骨的人，若你有自己的想法和未来蓝图便加分。它有点刻板，偶尔卸下力气、一起度过平和的时光，它也会忽然露出真实的一面。累积信任后，它会回以比谁都可靠、专一而诚实的爱。"}, "ESFJ": {"role": "执政官", "breed": "拉布拉多", "tag": "超会照顾人的人气王，直接又满满地表达爱意。", "pros": ["充满爱意", "细心", "开朗"], "cons": ["怕寂寞", "太爱操心", "易吃醋"], "personality": "善社交又爱照顾人，是讨周围所有人喜欢的人气角色。很会读气氛、从不吝惜体贴，以让人展露笑容为乐。对谁都友善好亲近，常处在团体的中心。开朗又充满活力，把人与人的联结看得比什么都重。另一面，它相当在意别人怎么看自己，因怕被讨厌而拼过头，也有惹人疼的温柔一面。", "love": "爱意表达直接又毫不吝啬。会对喜欢的人倾注满满的爱，连纪念日和小体贴都勤快珍视。最看重相处的时间与勤快的沟通，也有点希望对方回以同等爱意的小撒娇。会付出又可靠，另一面却在对方反应平淡或联系中断时变得不安，把寂寞攒下来。偶尔吃醋，但那正是专一想着对方的证据。是个在一起就让人心头变暖的孩子。", "howto": "让这只安心的关键，是勤快的联系与感谢的话。光是勤说「谢谢」「和你在一起真开心」，它的心就被填满，会更加为你付出。好好接住它的爱并回以同等分量最为重要；反应平淡会让它不安，要留意。温柔照顾它怕寂寞的一面，说一句「你是第一名」，距离便会迅速拉近。用同等温度回应它满满的爱，这只便会毫不吝啬地珍惜你。"}, "ISTP": {"role": "鉴赏家", "breed": "迷你腊肠犬", "tag": "酷酷又我行我素，话不多但内心炽热。", "pros": ["干脆", "独立", "关键时刻靠得住"], "cons": ["冷淡", "不露情绪", "我行我素"], "personality": "又酷又安静，却会对喜欢的事钻研到惊人程度的匠人气质型。不擅长把情绪表露在外，总是退一步冷静观察。讨厌黏腻的关系和过度干涉，是把自己的时间和节奏看得比什么都重的独立派。乍看冷淡，关键时刻却能精准行动，藏着靠得住的坚强内核。话不多，却在不经意的举动里渗出温柔，是个反差萌的孩子。", "love": "爱意表达克制又酷。比起黏腻，更喜欢彼此保持恰当距离、互相信赖的关系。不擅长把心意化为言语，对喜欢的人也常不自觉地显得冷淡。可那内里却藏着意外炽热的心意，在关键时刻会用行动确实表达爱。怕被束缚和依赖，但在尊重它自由的人面前，会一点点展露真实的自己。酷酷表面下那份笨拙又温暖的温柔，才是它真正的魅力。", "howto": "猛追或过度干涉都是反效果。对这只，尊重它的自由与节奏、又不动声色地待在身边，这样的距离感最奏效。不黏腻、却在需要时能确实依靠——建立起这样舒服的关系，它便会自己一点点敞开心扉。别为它冷淡的态度患得患失，能稳稳待着的人会让它安心。它话少却在行动里渗出温柔，别错过那些小信号、好好接住，它笨拙的爱便会慢慢传来。"}, "ISFP": {"role": "探险家", "breed": "法国斗牛犬", "tag": "慵懒的治愈系，按自己节奏自由去爱的和平主义者。", "pros": ["治愈系", "自然不做作", "温柔"], "cons": ["易随波逐流", "优柔寡断", "难猜真心"], "personality": "慢悠悠又我行我素，把自己的感性与「舒服」看得比什么都重的治愈系。不喜争执，珍视平静地享受当下这一刻。看似松弛自由，其实审美与感受性都很丰富，自有一套坚持。看似随波逐流，不肯退让的内核却确实存在。是个一在一起肩膀就忽然放松、裹着温暖平和气场的孩子。", "love": "偏爱松弛自然的恋爱。讨厌沉重的气氛、束缚和急匆匆的关系，是想和相处舒服轻松的人慢慢培养爱情的和平主义者。比起热情猛攻，更在共度平静时光中一点点加深爱意。温柔又有点容易随波逐流，常常不把真心明说。常被觉得「难猜」，那其实是不想起波澜的温柔。在安心的人面前，才会露出毫无防备、爱撒娇的真面目。", "howto": "催促或施压都是禁忌。对这只，为它营造松弛舒服的氛围才是最快的捷径。让它觉得「和你在一起很安心」，距离便会自然拉近。它不擅长把真心说出口，别强求，由你悄悄把它的心意引出来。它优柔寡断的一面，只要别催、帮它理清选项并陪在身边，它就会安心。尊重平静自由的关系，又适度让它撒娇，这只便会把你身边当作最舒服的归处。"}, "ESTP": {"role": "企业家", "breed": "比格犬", "tag": "行动至上，凭好奇与冲劲一口气拉近距离。", "pros": ["行动力强", "有兴致", "相处愉快"], "cons": ["急性子", "易腻", "不顾后果"], "personality": "行动力满满、好奇心旺盛、能量爆棚的类型。还没想就先动起来，是玩兴与冲劲的天才。超爱新鲜刺激的体验，受不了枯坐。身手轻快，在任何场合都能立刻打成一片，也是带动周围、炒热气氛的气氛制造机。虽有不顾前后就冲的一面，但凭那股表里如一的开朗与行动力，绝不会让身边的人无聊。元气满满又让人讨厌不起来，是个讨喜的角色。", "love": "一看上就立刻出击。是看重速度感与玩兴、热情又直接的恋爱型。会气势十足地向喜欢的人拉近，靠分享一起雀跃的体验来加深爱。比起细想，更想先动起来确认，所以关系推进也快。因为渴望刺激与乐趣，对一成不变很无力，对枯燥的关系会冷却。但与真正合拍的对象，会像玩伴一样笑着、自然地建立长久的关系。是个在一起永远不腻、最有趣的伴侣。", "howto": "拿下这只的关键，是好节奏与「一起玩」的姿态。带劲地回应、一起嗨，和它一头扎进活力满满的约会或新体验，距离便会迅速拉近。比起绕弯的欲擒故纵，它更喜欢直接易懂的来往，所以坦率表达好感才是正解。别让它无聊最重要，所以多多分享能一起大笑的时光和小刺激。让它觉得你是能一起雀跃的对象，这只便会凭一身行动力，笔直朝你冲来。"}, "ESFP": {"role": "表演者", "breed": "博美犬", "tag": "恋爱里最闪亮的主角，渴望被关注、被宠爱。", "pros": ["让气氛变华丽", "率真", "热情"], "cons": ["怕寂寞", "爱吃醋", "求关注"], "personality": "开朗华丽、能成为全场主角的天生表演者。玩兴足、超爱逗人开心，光是在场就能让那里瞬间明亮，存在感十足。情绪丰富、反应夸张，被喜欢的事物围绕、闪闪发光地度过时光时最幸福。喜欢被瞩目，也有点点想被关注的一面。爱热闹爱好玩，另一面其实怕寂寞，受不了被一个人冷落，是个渴望被爱的孩子。", "love": "恋爱的主角永远是自己。憧憬戏剧化又浪漫的爱，在喜欢的人面前会把可爱拉满、笔直地表达爱意。热情又率真，也因此是个希望对方回以同等热度与关注的撒娇鬼。若不能时常感到爱就会不安，偶尔也会吃醋；但那正是它专一想着你的证据。被满满地爱着、被特别对待时，这只会比谁都耀眼，回以毫不吝啬的爱与笑容。是个在一起就让每天都变华丽的太阳般的孩子。", "howto": "满足这只的诀窍，首先是勤快地关注、并清楚地用言语告诉它「你很特别」。越能实感被爱，它越会安心地全力爱你。反应夸张地夸它、一起营造快乐时光，它会无比开心。它怕寂寞，被冷落太久就会不安，这点要留意。把它的吃醋也当作爱的反面来接纳，用笔直的爱回应它。只要送上满满的爱与特别感，这只便会用最灿烂的笑容，点亮你的每一天。"}}};

function setLang(l){
  if(!LANGS.includes(l))return;
  L=l;
  try{const u=new URL(location.href);u.searchParams.set('lang',l);history.replaceState(null,'',u);}catch(e){}
  applyStatic();buildGrid();
  const aSel=document.getElementById('cpA').value,bSel=document.getElementById('cpB').value;
  buildSelects();
  if(aSel)document.getElementById('cpA').value=aSel;
  if(bSel)document.getElementById('cpB').value=bSel;
  const active=document.querySelector('.screen.active');
  const id=active?active.id:'top';
  if(id==='quiz')renderQ();
  else if(id==='result'&&current)renderResult(current,true);
  else if(id==='compat'&&document.getElementById('compatResult').innerHTML.trim())runCompat();
  else if(id==='loading'){const el=document.getElementById('load-msg');if(el)el.textContent=I().loading[0];}
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- quiz ---- */
function startQuiz(){qi=0;score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};hist=[];show('quiz');renderQ();}
function renderQ(){
  const Q=QUIZ[L],q=Q[qi];
  document.getElementById('qtext').textContent=q.t;
  document.getElementById('qcount').textContent='Q'+(qi+1)+' / '+Q.length;
  document.getElementById('pips').innerHTML=Q.map((_,i)=>'<div class="pip '+(i<=qi?'on':'')+'"></div>').join('');
  const o=document.getElementById('opts');o.innerHTML='';
  [q.a,q.b].forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=opt[0];
    b.onclick=()=>pick(opt[1]);
    o.appendChild(b);
  });
}
function pick(delta){
  for(const k in delta)score[k]+=delta[k];
  hist.push(delta);
  if(qi<QUIZ[L].length-1){qi++;renderQ();}else finish();
}
function quizBack(){
  if(qi===0){show('top');return;}
  qi--;const last=hist.pop();
  if(last)for(const k in last)score[k]-=last[k];
  renderQ();
}
function finish(){
  const code=(score.E>=score.I?'E':'I')+(score.S>=score.N?'S':'N')+(score.T>=score.F?'T':'F')+(score.J>=score.P?'J':'P');
  current=code;revealResult(code);
}

/* ---- shortcut grid ---- */
function buildGrid(){
  const g=document.getElementById('grid16');
  g.innerHTML=ORDER.map(c=>{
    let br=LOC[L][c].breed;
    if(L==='ja')br=br.replace('・レトリバー','').replace('・テリア','').replace('・ブルドッグ','ブル').replace('ミニチュア・','M.');
    return '<button class="tcell" style="border-bottom:4px solid '+GROUP[BASE[c].g]+'" onclick="pickType(\''+c+'\')">'
      +dogImg(c)+'<span class="code">'+c+'</span><span class="br">'+br+'</span></button>';
  }).join('');
}
function pickType(c){revealResult(c);}

/* ---- suspense reveal ---- */
function revealResult(code){
  current=code;
  const msgs=I().loading;
  const el=document.getElementById('load-msg');
  const dogEl=document.getElementById('load-dog');
  const dogs=['🐶','🐕','🐩','🦴'];
  show('loading');
  el.textContent=msgs[0];dogEl.textContent=dogs[0];
  const bar=document.querySelector('.load-bar i');
  if(bar){bar.style.animation='none';void bar.offsetWidth;bar.style.animation='';}
  clearInterval(loadTimer);
  let idx=0,di=0;
  loadTimer=setInterval(()=>{
    idx++;di++;
    if(idx<msgs.length)el.textContent=msgs[idx];
    dogEl.textContent=dogs[di%dogs.length];
  },650);
  setTimeout(()=>{clearInterval(loadTimer);renderResult(code);},2000);
}

/* ---- result ---- */
function renderResult(code,stay){
  const d=LOC[L][code],g=BASE[code].g,col=GROUP[g],i=I();
  const cert=document.getElementById('cert');
  cert.style.background='linear-gradient(180deg,#fff,'+hex(g)+')';

    +'<div class="role">'+i.type_label+'</div>'
    +'<div class="tagline">'+d.tag+'</div>';
  document.getElementById('desc').innerHTML=
     block(i.h_pers,d.personality)
    +block(i.h_love,d.love)
    +'<div class="sec"><h3><span class="dot"></span>'+i.h_pros+'</h3><div class="taglist">'+d.pros.map(p=>'<span>💗 '+p+'</span>').join('')+'</div></div>'

    +block(i.h_howto,d.howto);
  const seed=daySeed(),cn=codeNum(code);
  const w=WALK[L][(seed+cn)%WALK[L].length];

     '<div class="dcard walk"><span class="ico">🐾</span><h4>'+i.h_walk+'</h4><p>'+w+'</p></div>'
    +'<div class="dcard lucky"><span class="ico">🍀</span><h4>'+i.h_lucky+'</h4><p>'+lk+'</p></div>';
  if(!stay)show('result');

function daySeed(){const d=new Date();return Math.floor(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/86400000);}
function codeNum(code){let n=0;for(const ch of code)n+=ch.charCodeAt(0);return n;}
function block(title,body){return '<div class="sec"><h3><span class="dot"></span>'+title+'</h3><p>'+body+'</p></div>';}
function hex(g){return {NT:'#f3edfb',NF:'#fff1f3',SJ:'#eef9f3',SP:'#fff6e9'}[g];}

/* ---- compatibility ---- */
function compatScore(a,b){
  if(a===b)return[70,BANDS[L].same];
  const key=[a,b].sort().join('|');
  if(HIGH[key])return[HIGH[key][0],HIGH[key][1][L]];
  let s=46;
  s+=(a[0]!==b[0])?8:5;
  s+=(a[1]===b[1])?16:4;
  s+=(a[2]!==b[2])?10:6;
  s+=(a[3]!==b[3])?9:6;
  const sorted=[a,b].sort().join('');
  s+=((sorted.charCodeAt(0)+sorted.charCodeAt(5))%7)-3;
  s=Math.max(40,Math.min(97,s));
  const B=BANDS[L];
  const msg=s>=82?B.b82:s>=70?B.b70:s>=58?B.b58:B.low;
  return[s,msg];
}
function buildSelects(){
  const opt=ORDER.map(c=>'<option value="'+c+'">'+BASE[c].em+' '+LOC[L][c].breed+' ('+c+')</option>').join('');
  document.getElementById('cpA').innerHTML=opt;
  document.getElementById('cpB').innerHTML=opt;
}
function goCompat(){if(current)document.getElementById('cpA').value=current;show('compat');}
function runCompat(){
  const a=document.getElementById('cpA').value,b=document.getElementById('cpB').value;
  const r=compatScore(a,b),s=r[0],msg=r[1];
  document.getElementById('compatResult').innerHTML=
   '<div class="compat-pick mt"><div class="pair">'+dogImg(a)+'<span class="heart">💞</span>'+dogImg(b)+'</div>'
   +'<div class="score-ring"><div class="num">'+s+'<span style="font-size:24px">%</span></div>'
   +'<div class="lbl">'+LOC[L][a].breed+' × '+LOC[L][b].breed+'</div></div>'
   +'<p style="text-align:center;font-size:15px;margin-top:10px">'+msg+'</p></div>';
}

  else if(L==='en')text='My love-dog is '+d.breed+' ('+current+')! 🐾\n"'+d.tag+'"\nWhat is your love-dog?';

  else text='我的恋爱犬是【'+d.breed+'】('+current+')！🐾\n「'+d.tag+'」\n你的恋爱犬是哪只？';
  const url=location.href.split('?')[0];
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url)+'&hashtags='+encodeURIComponent(i.hashtag),'_blank');
}
